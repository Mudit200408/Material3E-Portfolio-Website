name: portfolio_web
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  flutter_svg: ^2.2.2
  material_shapes: ^0.0.2
  motor: ^1.0.1
  responsive_framework: ^1.5.1
  responsive_scaler: ^0.1.0
  supabase_flutter: ^2.10.3
  flutter_m3shapes:
    path: "../flutter_m3shapes/"
  avatar_glow: ^3.0.1
  m3e_collection: ^0.3.7
  flutter_custom_caraousel_v2: ^0.2.0
  url_launcher: ^6.3.2
  flutter_animate: ^4.5.0
  visibility_detector: ^0.4.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/
    - assets/images/
    - .env

  fonts:
    - family: GoogleSansFlex
      fonts:
        - asset: assets/fonts/GoogleSansFlex-VariableFont_GRAD,ROND,opsz,slnt,wdth,wght.ttf
